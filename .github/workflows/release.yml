name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer release version (for example 0.3.0 or v0.3.0)"
        required: true
        type: string
      target_ref:
        description: "Git ref to release from"
        required: true
        default: "main"
        type: string
      prerelease:
        description: "Mark the release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      target_ref: ${{ steps.meta.outputs.target_ref }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Normalize release metadata
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TARGET_REF: ${{ inputs.target_ref }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          raw_version="${INPUT_VERSION}"
          normalized="${raw_version#v}"

          if [[ ! "$normalized" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must be SemVer, e.g. 0.3.0 or v0.3.0" >&2
            exit 1
          fi

          tag_name="v${normalized}"
          release_name="ACI Platform ${tag_name}"

          {
            echo "tag_name=${tag_name}"
            echo "release_name=${release_name}"
            echo "target_ref=${INPUT_TARGET_REF}"
            echo "prerelease=${INPUT_PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

  validate-and-build:
    runs-on: ubuntu-latest
    needs: resolve-release
    timeout-minutes: 30
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.target_ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Run quality gate
        run: |
          ruff check src/ tests/
          mypy src tests --strict
          pytest -q

      - name: Build Python distribution artifacts
        run: python -m build

      - name: Create release manifest and checksums
        shell: bash
        env:
          MANIFEST_TAG: ${{ needs.resolve-release.outputs.tag_name }}
          MANIFEST_RELEASE_NAME: ${{ needs.resolve-release.outputs.release_name }}
          MANIFEST_TARGET_REF: ${{ needs.resolve-release.outputs.target_ref }}
          MANIFEST_PRERELEASE: ${{ needs.resolve-release.outputs.prerelease }}
        run: |
          set -euo pipefail

          mkdir -p release-assets
          cp dist/* release-assets/
          cp requirements.lock requirements-dev.lock release-assets/
          commit_sha="$(git rev-parse HEAD)"

          jq --null-input \
            --arg release_tag "${{ needs.resolve-release.outputs.tag_name }}" \
            --arg release_name "${{ needs.resolve-release.outputs.release_name }}" \
            --arg target_ref "${{ needs.resolve-release.outputs.target_ref }}" \
            --arg commit_sha "${commit_sha}" \
            --argjson prerelease ${{ needs.resolve-release.outputs.prerelease }} \
            '{release_tag: $release_tag, release_name: $release_name, target_ref: $target_ref, commit_sha: $commit_sha, prerelease: $prerelease}' \
            > release-assets/release-manifest.json

          (
            cd release-assets
            sha256sum * > SHA256SUMS.txt
          )

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - validate-and-build
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ needs.resolve-release.outputs.tag_name }}
      RELEASE_NAME: ${{ needs.resolve-release.outputs.release_name }}
      TARGET_REF: ${{ needs.resolve-release.outputs.target_ref }}
      PRERELEASE: ${{ needs.resolve-release.outputs.prerelease }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create immutable release tag if missing
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin
          target_sha="$(git rev-parse "${TARGET_REF}")"

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            existing_sha="$(git rev-list -n 1 "${TAG_NAME}")"
            if [[ "${existing_sha}" != "${target_sha}" ]]; then
              echo "Tag ${TAG_NAME} already exists on ${existing_sha}, not ${target_sha}" >&2
              exit 1
            fi
          else
            git tag -a "${TAG_NAME}" "${target_sha}" -m "Release ${TAG_NAME}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail

          prerelease_flag=()
          latest_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag+=(--prerelease)
            latest_flag+=(--latest=false)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/* --clobber
            gh release edit "${TAG_NAME}" "${prerelease_flag[@]}" "${latest_flag[@]}"
          else
            gh release create "${TAG_NAME}" \
              release-assets/* \
              --title "${RELEASE_NAME}" \
              --generate-notes \
              "${prerelease_flag[@]}" \
              "${latest_flag[@]}"
          fi
