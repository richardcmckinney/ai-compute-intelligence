name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Ruff runtime-safety lint
        run: ruff check src/ tests/ --select F

      - name: Dependency consistency check
        run: |
          python -m ensurepip --upgrade
          python -m pip check

      - name: Verify lockfiles are up to date
        run: |
          python -m pip install --upgrade uv
          uv pip compile pyproject.toml --output-file /tmp/requirements.lock
          uv pip compile pyproject.toml --extra dev --extra glass-jaw --output-file /tmp/requirements-dev.lock
          tail -n +3 requirements.lock > /tmp/requirements.lock.expected
          tail -n +3 /tmp/requirements.lock > /tmp/requirements.lock.generated
          tail -n +3 requirements-dev.lock > /tmp/requirements-dev.lock.expected
          tail -n +3 /tmp/requirements-dev.lock > /tmp/requirements-dev.lock.generated
          diff -u /tmp/requirements.lock.expected /tmp/requirements.lock.generated
          diff -u /tmp/requirements-dev.lock.expected /tmp/requirements-dev.lock.generated

  unit-tests:
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --tb=short --cov=aci --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -m integration

  glass-jaw-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Run Glass Jaw validation tests
        run: pytest tests/glass_jaw/ -v --tb=short -m glass_jaw

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [integration-tests, glass-jaw-tests]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t aci-platform:${{ github.sha }} .

      - name: Smoke test health endpoint
        run: |
          docker run -d --name aci-smoke -p 8000:8000 aci-platform:${{ github.sha }}
          sleep 8
          curl --retry 5 --retry-delay 2 --fail http://localhost:8000/health
          docker stop aci-smoke

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: aci-platform:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          if-no-files-found: error
