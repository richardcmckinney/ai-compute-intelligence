name: Cache Hygiene

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * 1"

permissions:
  actions: write
  contents: read

jobs:
  prune-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Prune stale GitHub Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = Date.now();
            const msPerDay = 24 * 60 * 60 * 1000;

            const caches = [];
            let page = 1;
            while (true) {
              const response = await github.request(
                "GET /repos/{owner}/{repo}/actions/caches",
                { owner, repo, per_page: 100, page }
              );
              const pageCaches = response.data.actions_caches || [];
              caches.push(...pageCaches);
              if (pageCaches.length < 100) {
                break;
              }
              page += 1;
            }

            const deleted = [];
            const kept = [];

            const mainSetup = caches
              .filter((cache) =>
                cache.ref === "refs/heads/main" && cache.key.startsWith("setup-python-")
              )
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const mainCodeql = caches
              .filter((cache) =>
                cache.ref === "refs/heads/main" && cache.key.startsWith("codeql-overlay-base-database-")
              )
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const keepIds = new Set([
              ...mainSetup.slice(0, 2).map((cache) => cache.id),
              ...mainCodeql.slice(0, 2).map((cache) => cache.id),
            ]);

            for (const cache of caches) {
              const ageDays = (now - new Date(cache.created_at).getTime()) / msPerDay;
              const isPullRef = cache.ref.startsWith("refs/pull/");

              const shouldDelete =
                (isPullRef && ageDays >= 1) ||
                (!isPullRef && cache.ref === "refs/heads/main" && !keepIds.has(cache.id) && ageDays >= 7);

              if (!shouldDelete) {
                kept.push(cache);
                continue;
              }

              await github.request(
                "DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}",
                { owner, repo, cache_id: cache.id }
              );
              deleted.push(cache);
            }

            core.summary
              .addHeading("Cache Hygiene Result")
              .addRaw(`Total caches inspected: ${caches.length}\n`)
              .addRaw(`Deleted caches: ${deleted.length}\n`)
              .addRaw(`Retained caches: ${kept.length}\n`);

            if (deleted.length > 0) {
              core.summary.addHeading("Deleted IDs");
              for (const cache of deleted) {
                core.summary.addRaw(
                  `- ${cache.id} | ${cache.ref} | ${cache.key} | ${cache.size_in_bytes} bytes\n`
                );
              }
            }
            await core.summary.write();
