changelog:
  exclude:
    labels:
      - skip-release-notes
      - ignore-for-release
    authors:
      - github-actions[bot]
  categories:
    - title: Runtime & API
      labels:
        - api
        - runtime
        - ingestion
    - title: Attribution & Decisioning
      labels:
        - attribution
        - interceptor
        - hre
        - policy
        - finops
        - forecast
    - title: Security & Operations
      labels:
        - security
        - infra
        - ci
    - title: Demo & Documentation
      labels:
        - demo
        - docs
        - wiki
    - title: Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - "*"
