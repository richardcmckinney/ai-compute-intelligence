function rAttribution(){

  const confLabel=r.conf>=.8?'Chargeback-Ready':r.conf>=.5?'Provisional':'Estimated';

  // TRAC breakdown for this request

  const covLayers=[{l:"Model Invocation",p:100,s:"Cloud Telemetry"},{l:"Service Attribution",p:97.2,s:"CI/CD + Deploy Logs"},{l:"Code Ownership",p:94.1,s:"CODEOWNERS + Repo Permissions"},{l:"Identity Resolution",p:88.4,s:"Okta/Azure AD + Heuristic"},{l:"Org Hierarchy",p:96.0,s:"Workday Sync"},{l:"Budget Attribution",p:91.4,s:"ERP Mapping"}];

    <div class="card">
      <div class="stit" style="margin-bottom:2px">Attribution Graph</div>
      <div style="font-size:12px;color:var(--tx3);margin-bottom:16px;line-height:1.6">Every inference request resolves through a six-layer attribution chain linking model invocation to the financial system of record. The chain is constructed from cross-system correlation via the Heuristic Reconciliation Engine, with calibrated confidence at each layer. Select a request to inspect.</div>
      <div class="rsel">${rBtns}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:12px 16px;background:var(--surface);border-radius:8px;border:1px solid var(--bdr)">
        <div style="font-size:11px;color:var(--tx3)"><code style="color:var(--tx2)">${r.id}</code> at ${r.time} · ${r.inTok.toLocaleString()} in / ${r.outTok.toLocaleString()} out · $${r.cost.toFixed(4)} · ${r.ms}ms interception overhead</div>
        <div style="display:flex;gap:6px"><span class="pill" style="background:${confColor}12;color:${confColor}">${confLabel}</span><span class="pill" style="background:var(--blueBg);color:var(--blue)">Conf ${r.conf.toFixed(2)}</span><span class="pill" style="background:var(--purBg);color:var(--pur)">${r.mode} Mode</span></div>
      </div>
      ${chain}
      <div style="margin-top:14px;padding:12px 16px;background:var(--surface);border-radius:8px;border:1px solid var(--bdr)">
        <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Advisory Mode Enrichment (HTTP Response Headers)</div>
        <div style="font-family:monospace;font-size:11px;color:var(--tx2);line-height:1.8">${r.enrichment.headerSent}</div>
        ${r.enrichment.altModels!=='None (no verified equivalent for code review tasks)'&&r.enrichment.altModels!=='N/A (already lowest-cost model in class)'?`<div style="margin-top:6px;font-size:11px;color:var(--grn)">Alternative: ${r.enrichment.altModels}</div>`:`<div style="margin-top:6px;font-size:11px;color:var(--tx3)">Alternative: ${r.enrichment.altModels}</div>`}
      </div>
    </div>
    <div class="g g2">
      <div class="card">
        <div class="sstit">TRAC: Total Risk-Adjusted Cost (This Request)</div>
        <div style="font-size:11px;color:var(--tx3);margin-bottom:12px">Unifies billed cost, carbon liability, and attribution confidence risk into a single financial metric.</div>
        <div class="trac-bar">
          <div class="trac-seg" style="width:${(billedCost/r.trac*100).toFixed(0)}%;background:var(--blue)">$${billedCost.toFixed(4)}</div>
          <div class="trac-seg" style="width:${Math.max(carbonLiab/r.trac*100,3).toFixed(0)}%;background:var(--grn)">${carbonLiab>0.0001?'$'+carbonLiab.toFixed(5):'~$0'}</div>
          <div class="trac-seg" style="width:${Math.max(confRisk/r.trac*100,5).toFixed(0)}%;background:var(--amb)">$${confRisk.toFixed(4)}</div>
        </div>
        <div style="display:flex;gap:16px;font-size:11px;margin-top:8px">
          <span style="display:flex;align-items:center;gap:4px;color:var(--tx3)"><span style="width:8px;height:8px;border-radius:2px;background:var(--blue);display:inline-block"></span>Billed Cost</span>
          <span style="display:flex;align-items:center;gap:4px;color:var(--tx3)"><span style="width:8px;height:8px;border-radius:2px;background:var(--grn);display:inline-block"></span>Carbon Liability</span>
          <span style="display:flex;align-items:center;gap:4px;color:var(--tx3)"><span style="width:8px;height:8px;border-radius:2px;background:var(--amb);display:inline-block"></span>Confidence Risk</span>
        </div>
        <div style="margin-top:12px;font-size:22px;font-weight:700;color:var(--tx)">TRAC: $${r.trac.toFixed(4)}</div>
        <div style="font-size:10px;color:var(--tx3);margin-top:2px">Risk multiplier: 0.15 · Carbon price: $50/tCO2e · Conf: ${r.conf.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="sstit">Attribution Coverage by Layer</div>
        ${covLayers.map(x=>{const c=x.p===100?'var(--grn)':x.p>95?'var(--blue)':x.p>88?'var(--tx)':'var(--amb)',vc=x.p===100?'var(--grn)':x.p>95?'var(--blue)':'var(--amb)';return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--tx2)">${x.l}<span style="color:var(--tx3);font-size:10px;margin-left:6px">${x.s}</span></span><span style="color:${vc};font-weight:600">${x.p}%</span></div>${prog(x.p,c)}</div>`}).join('')}
      </div>
    </div>
  </div>`}

    {name:'Active Mode',desc:'May modify or redirect requests. Requires capability equivalence verification, fail-open circuit breaker, semantic guardrails, and explicit opt-in per workload.',active:false,icon:'zap',color:'var(--pur)'}
  ];
  const modeCards=modes.map(m=>`<div class="cdi" style="border-color:${m.active?'rgba(28,199,126,.3)':'var(--bdr)'}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${m.active?m.color:'var(--tx3)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${I[m.icon]}</svg><span style="font-size:12px;font-weight:600;color:${m.active?m.color:'var(--tx)'}">${m.name}</span>${m.active?'<span class="pill" style="background:var(--grnBg);color:var(--grn)">Current</span>':''}</div><div style="font-size:11px;color:var(--tx3);line-height:1.5">${m.desc}</div></div>`).join('');
  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="g g4">${met(I.shield,'Active Policies',String(POLICIES.filter(p=>p.st==='active').length),null,null,null,'var(--blue)')}${met(I.alert,'Violations',String(POLICIES.reduce((s,p)=>s+p.viol,0)),null,null,'this month','var(--amb)')}${met(I.lock,'Blocked Requests','47',null,null,'opt-in hard stops','var(--red)')}${met(I.check,'Compliance','99.7%',null,null,'of requests','var(--grn)')}</div>
    <div class="g g2">
      <div class="card"><div class="sstit">Deployment Mode</div><div style="font-size:11px;color:var(--tx3);margin-bottom:12px">Three modes control intervention posture. Each mode deepens integration and increases switching cost. Mode applies globally; individual workloads may opt into stricter enforcement.</div>${modeCards}</div>
      <div class="card"><div class="sstit">Security &amp; Trust Boundary</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${[{l:'Deployed Inside Customer VPC',d:'All telemetry aggregation, attribution logic, and reporting occurs within the customer infrastructure. Containerized on EKS/AKS/GKE.',c:'var(--grn)',i:'shield'},
             {l:'Zero Log Exfiltration',d:'Raw logs, telemetry, and identifiable data never leave the customer trust boundary. Benchmarking exports only pre-aggregated, anonymized statistical summaries.',c:'var(--blue)',i:'lock'},
             {l:'Read-Only Permissions',d:'No write permissions to any customer system. Cloud billing, CI/CD, source control, identity, and HR integrations are strictly read-only.',c:'var(--cya)',i:'eye'},
             {l:'Fail-Open Safety',d:'If the platform fails, applications are unaffected. The interceptor never blocks a request on system error. Hard timeout budget: 20ms.',c:'var(--amb)',i:'zap'}
          ].map(x=>`<div style="display:flex;gap:10px;padding:10px 12px;background:var(--surface);border-radius:7px;border:1px solid var(--bdr)"><div style="min-width:4px;border-radius:2px;background:${x.c};flex-shrink:0"></div><div><div style="font-size:11px;font-weight:600;color:var(--tx)">${x.l}</div><div style="font-size:10px;color:var(--tx3);margin-top:2px">${x.d}</div></div></div>`).join('')}
          <div style="display:flex;gap:8px;margin-top:4px">
            <span class="pill" style="background:var(--grnBg);color:var(--grn)">SOC 2 Type 1 In Progress</span>
            <span class="pill" style="background:var(--purBg);color:var(--pur)">NDA Required</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card"><div class="chdr"><div><div class="stit" style="margin-bottom:2px">Policy Engine</div><div style="font-size:11px;color:var(--tx3)">Policies operate at Layer 2 (attribution-based detection) and Layer 3 (decision-time enforcement). Intervention posture: optimizer, not cost cop. Soft stops are default; hard stops require explicit opt-in.</div></div><div style="display:flex;gap:6px"><span class="pill" style="background:var(--cyaBg);color:var(--cya)">Slack Alerts</span><span class="pill" style="background:var(--purBg);color:var(--pur)">Datadog SDK</span><span class="pill" style="background:var(--blueBg);color:var(--blue)">CI/CD Hooks</span></div></div>${pCards}</div></div>`}

// ═══════ CARBON LEDGER ═══════
function rCarbon(){
  const totalCarbon=MODELS.reduce((s,m)=>s+m.carbon,0);
  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="mode-ind"><div class="mode-dot" style="background:var(--cya)"></div><span style="color:var(--cya);font-weight:600">Carbon Attribution</span><span style="color:var(--tx3)">·</span><span style="color:var(--tx3)">Layer 2 methodology (activity-based). Energy per inference from AI Energy Score benchmarks. Grid intensity: hourly, region-resolved. GHG Protocol Scope 2+3.</span></div>
    <div class="g g4">
      ${met(I.globe,'Monthly Emissions',fN(totalCarbon)+' kg','','','CO₂e (Scope 2+3)','var(--cya)')}
      ${met(I.activity,'Carbon Intensity','2.1 g','','','CO₂e per 1K tokens (avg)','var(--grn)')}
      ${met(I.dollar,'Carbon Liability','$836','','','at $50/tCO₂e internal price','var(--amb)')}
      ${met(I.shield,'Methodology','Layer 2','','','Activity-based, ±15-30%','var(--pur)')}
    </div>
    <div class="g g2">
      <div class="card"><div class="stit">Emissions by Model (kg CO₂e)</div><div style="height:260px;position:relative"><canvas id="ch-carb"></canvas></div></div>
      <div class="card">
        <div class="stit">Carbon Ledger Methodology</div>
        <div style="font-size:12px;color:var(--tx3);line-height:1.7">
          <div style="margin-bottom:10px">Every carbon figure carries an immutable calculation receipt with full provenance:</div>
          ${[{l:'Layer 1 (Baseline)',d:'Spend-based estimation. carbon = spend × industry avg factor. ±50-100%. Labeled "Estimated."',c:'var(--amb)'},
             {l:'Layer 2 (Standard)',d:'Activity-based. energy_per_inference(model) × grid_intensity(region, hour) × count + embodied allocation. ±15-30%.',c:'var(--grn)'},
             {l:'Layer 3 (Premium)',d:'Instrumented measurement via Kepler/RAPL/NVML. ±5-15%. Requires host-level access.',c:'var(--blue)'}].map(x=>
            `<div style="display:flex;gap:10px;margin-bottom:8px;padding:10px 12px;background:var(--surface);border-radius:7px;border:1px solid var(--bdr)"><div style="width:4px;border-radius:2px;background:${x.c};flex-shrink:0"></div><div><div style="font-size:11px;font-weight:600;color:var(--tx)">${x.l}</div><div style="font-size:11px;color:var(--tx3);margin-top:2px">${x.d}</div></div></div>`).join('')}
          <div style="margin-top:10px;padding:10px 12px;background:var(--surface);border-radius:7px;border:1px solid var(--bdr)">
            <div style="font-size:11px;font-weight:600;color:var(--tx)">Scope Classification</div>
            <div style="font-size:11px;color:var(--tx3);margin-top:2px">Scope 2: Direct cloud compute. Scope 3 Cat. 1: Third-party API inference (OpenAI, Anthropic, Google). Dual-method reporting: location-based and market-based per GHG Protocol.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card"><div class="stit">Monthly Carbon Trend (kg CO₂e)</div><div style="height:200px;position:relative"><canvas id="ch-carb-trend"></canvas></div></div>
  </div>`}

function iCarbon(){
  const sorted=[...MODELS].sort((a,b)=>b.carbon-a.carbon);
  mkChart('ch-carb',{type:'bar',data:{labels:sorted.map(m=>m.name),datasets:[{data:sorted.map(m=>m.carbon),backgroundColor:sorted.map((_,i)=>CC[i%CC.length]),borderRadius:4,barThickness:26}]},options:{...cDef,indexAxis:'y',scales:{x:{...cDef.scales.x,ticks:{...cDef.scales.x.ticks,callback:v=>fN(v)+' kg'}},y:{...cDef.scales.y,ticks:{...cDef.scales.y.ticks,font:{size:10,family:'monospace'}}}}}});
  mkChart('ch-carb-trend',{type:'line',data:{labels:SPEND_TREND.map(d=>d.m),datasets:[{label:'CO₂e',data:SPEND_TREND.map(d=>d.carbon),borderColor:'#17bec8',backgroundColor:'rgba(23,190,200,.06)',fill:true,tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#17bec8'}]},options:{...cDef,scales:{...cDef.scales,y:{...cDef.scales.y,ticks:{...cDef.scales.y.ticks,callback:v=>v+' kg'}}}}});
}

// ═══════ GLOSSARY ═══════
function rGlossary(){
  const terms=[
    {cat:'Core Metrics',items:[
      {t:'Optimization Potential',aka:'Formerly "Waste"',d:'The dollar value of AI compute spend that can be reduced or eliminated without degrading output quality. Calculated by analyzing each workload against six categories: model over-provisioning, duplicate requests, orphaned resources, staging/dev sprawl, prompt inefficiency, and batch mispricing. Each category maps to a specific intervention type with a confidence-scored savings estimate. Only spend with a verified or high-confidence reduction path is included; speculative savings are excluded.',f:null},
      {t:'TRAC',aka:'Total Risk-Adjusted Cost',d:'A unified financial metric that captures the true cost of an AI workload beyond what appears on the cloud bill. TRAC combines three components into a single number that enables apples-to-apples comparison across teams, models, and providers.',f:'TRAC = Billed Cost + Carbon Liability + Confidence Risk Premium'},
      {t:'Carbon Liability',aka:null,d:'The financial exposure from carbon emissions associated with AI inference. Calculated by multiplying estimated emissions (kgCO₂e) by the organization\'s internal carbon price. Default: $50/tCO₂e, configurable per customer.',f:'Carbon Liability = emissions_kgCO2e × carbon_price_per_kg'},
      {t:'Confidence Risk Premium',aka:null,d:'An actuarial charge reflecting the financial risk of misattributed spend. When attribution confidence is below 1.0, there is a probability that costs are charged to the wrong team or budget. The premium quantifies this risk for financial planning purposes.',f:'Risk Premium = billed_cost × (1 - confidence) × risk_multiplier'},
      {t:'Attribution Confidence',aka:null,d:'A calibrated probability (0.0 to 0.95) representing how reliably a specific inference request has been linked to its true organizational owner through the six-layer attribution chain. Confidence is capped at 0.95 to account for irreducible enterprise data quality error. Calibration uses isotonic regression on ground truth from CI/CD provenance, user corrections, and FinOps review.'},
    ]},
    {cat:'Attribution Architecture',items:[
      {t:'Attribution Chain',aka:'Six-Layer Attribution Graph',d:'The structured resolution path that links every AI inference request to its financial owner. Six layers, each resolved independently: (1) Model Invocation: which model, provider, and cloud endpoint. (2) Service Attribution: which deployed service made the call. (3) Code Ownership: which repository and code path owns the calling code. (4) Identity Resolution: which individual or team triggered the request. (5) Org Hierarchy: which organizational unit the individual belongs to. (6) Budget Attribution: which cost center and general ledger code bears the charge.'},
      {t:'Heuristic Reconciliation Engine',aka:'HRE',d:'The core attribution system that resolves the identity of each inference request\'s owner by cross-correlating signals from disconnected enterprise systems (cloud billing, CI/CD, source control, identity providers, HR/org charts, ERP). Uses six reconciliation methods (R1 through R6), each producing a calibrated confidence score, combined via Noisy-OR with dependency penalty.'},
      {t:'R1: Direct Match',aka:null,d:'Deterministic identifier linking. API key → service account → code repository → team. Highest confidence (typically 1.0). Used when unambiguous identifiers exist in telemetry.'},
      {t:'R2: Temporal Correlation',aka:null,d:'Correlates events across systems by timestamp proximity. If a deployment event and a new API key activation occur within a configurable window, they are probabilistically linked. Confidence varies (0.70-0.95) based on window tightness and competing events.'},
      {t:'R3: Naming Convention',aka:null,d:'Matches service names, repository paths, and resource tags against organizational naming patterns. Useful for organizations with consistent naming conventions; degrades gracefully when conventions are inconsistent.'},
      {t:'R4: Historical Pattern',aka:null,d:'Uses past attribution resolutions as Bayesian priors. If a service account has historically been attributed to Team X, new requests from that account inherit a prior probability toward Team X, updated by current evidence.'},
      {t:'R5: Service Account Resolution',aka:null,d:'Resolves shared service accounts (e.g., svc-analytics) to their most likely organizational owner by combining temporal patterns, code ownership, and deployment history. Produces lower confidence scores (0.50-0.75) reflecting inherent ambiguity.'},
      {t:'R6: Proportional Allocation',aka:null,d:'Fallback method. Distributes costs proportionally across teams known to use a shared resource, weighted by historical usage patterns. Lowest confidence method; used only when R1 through R5 cannot resolve ownership.'},
    ]},
    {cat:'Confidence Thresholds',items:[
      {t:'Chargeback-Ready',aka:'Confidence ≥ 0.80',d:'Attribution has sufficient confidence to be included in automated chargeback processes, compliance exports, and budget enforcement actions. The threshold is configurable per customer.'},
      {t:'Provisional',aka:'Confidence 0.50 to 0.79',d:'Attribution is directionally correct but carries meaningful uncertainty. Included in dashboards and reports with a provisional flag. Excluded from automated chargebacks. Routed to FinOps for manual review on a periodic basis.'},
      {t:'Estimated',aka:'Confidence < 0.50',d:'Attribution is a best-effort estimate, typically based on proportional allocation or sparse signals. Displayed for awareness but excluded from all enforcement and compliance actions.'},
    ]},
    {cat:'Three-Layer Model',items:[
      {t:'Layer 1: Measure',aka:null,d:'Token usage, cost tracking, and basic telemetry. Table stakes capability that cloud providers and observability platforms partially address. The platform integrates (not competes) at this layer, ingesting data from existing tools.'},
      {t:'Layer 2: Attribute',aka:null,d:'Graph-based identity resolution linking model invocations through services, code, identity, organizational hierarchy, and budgets. The platform\'s core differentiation. No incumbent can deliver this without building the cross-system correlation engine.'},
      {t:'Layer 3: Intervene',aka:null,d:'Decision-time actions: model routing, budget enforcement, pre-deploy cost simulation, and governance policies. The platform\'s defensible moat. Requires Layer 2 attribution to function; interventions without attribution are uninformed.'},
    ]},
    {cat:'Deployment & Governance',items:[
      {t:'Passive Observation',aka:'Deployment Mode 1',d:'Sidecar/observer deployment. The platform logs enrichment data and produces Deployment Impact Reports asynchronously. It does not modify, gate, or redirect any request. Zero operational risk. Typical starting mode for new customers.'},
      {t:'Advisory Mode',aka:'Deployment Mode 2',d:'The platform enriches API response headers with cost, attribution, and optimization signals (X-Compute-Cost-USD, X-Alternative-Models-Available, X-Attribution-Confidence). Applications choose whether to act on the data. Current active mode for this deployment.'},
      {t:'Active Mode',aka:'Deployment Mode 3',d:'The platform may modify or redirect requests (e.g., route to a cheaper equivalent model). Requires capability equivalence verification, fail-open circuit breaker, semantic guardrails, and explicit opt-in per individual workload. Never applied globally.'},
      {t:'Soft Stop',aka:null,d:'A governance response that alerts, logs, and notifies without blocking the request. The request proceeds; the violation is recorded and routed to the appropriate approver. Soft stops are the default enforcement posture. The platform operates as an optimizer, not a cost cop.'},
      {t:'Hard Stop',aka:null,d:'A governance response that blocks a request until an approval condition is met (e.g., team lead sign-off, VP override). Hard stops require explicit opt-in per workload and are never applied by default.'},
      {t:'Capability Equivalence',aka:null,d:'The verification process that confirms a proposed alternative model produces output of equivalent quality for a specific use case before any routing change is applied. Three verification modes: Mode 1 (Policy-based: admin-defined model families), Mode 2a (Empirical: shadow evaluation with minimum 100 requests), Mode 2b (LLM-as-judge: blind evaluation with 200 samples). If no mode confirms equivalence, the request routes to the originally requested model.'},
      {t:'Fail-Open Interceptor',aka:null,d:'The platform\'s safety architecture. If the enrichment system fails, times out, or encounters an error, the original request proceeds unmodified. Hard timeout budget: 20ms. The interceptor reads only from a local in-memory attribution index (precomputed) and never makes synchronous calls to external systems. All decision-time operations are O(1) with respect to attribution graph size.'},
    ]},
    {cat:'Carbon Ledger',items:[
      {t:'Carbon Methodology Layers',aka:null,d:'Three tiers of carbon measurement precision. Layer 1 (Baseline): Spend-based estimation, ±50-100% uncertainty, labeled "Estimated." Layer 2 (Standard): Activity-based calculation using energy-per-inference benchmarks and hourly regional grid intensity, ±15-30% uncertainty. Layer 3 (Premium): Instrumented measurement via Kepler, RAPL, or NVML probes at the hardware level, ±5-15% uncertainty.'},
      {t:'Calculation Receipt',aka:'Immutable Provenance Record',d:'Every carbon figure produced by the platform carries an immutable receipt documenting: measurement layer, accounting method (location-based or market-based), grid factor source, energy model source, hardware profile assumptions, embodied carbon allocation method, and uncertainty band. Receipts enable third-party audit and prevent greenwashing.'},
    ]},
    {cat:'Optimization Potential Categories',items:WASTE_CATS.map(w=>({t:w.name,aka:null,d:w.desc+'. Identified through Layer 2 attribution analysis and Layer 3 intervention recommendation engine.'}))},
  ];
  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card"><div style="font-size:12px;color:var(--tx3);line-height:1.6">This glossary defines every metric, concept, and technical term used across the platform. Terms are grouped by functional area. Hover over <span class="tip" data-tip="Like this one">dotted-underline terms</span> elsewhere in the platform for quick definitions.</div></div>
    ${terms.map(cat=>`<div class="card"><div class="gl-cat">${cat.cat}</div>${cat.items.map(it=>`<div class="gl-term"><div class="gl-title">${it.t}${it.aka?`<span class="gl-aka">${it.aka}</span>`:''}</div><div class="gl-def">${it.d}</div>${it.f?`<div class="gl-formula">${it.f}</div>`:''}</div>`).join('')}</div>`).join('')}
  </div>`}

// ═══════ FAQ & SUPPORT ═══════
function rFaq(){
  const cats=[
    {cat:'Getting Started',qs:[
      {q:'How does the platform intercept AI inference requests?',a:'The platform deploys a lightweight interceptor within your existing infrastructure (Kubernetes sidecar, API gateway plugin, or SDK wrapper). The interceptor reads from a precomputed in-memory attribution index to enrich requests with cost and attribution data. It operates within a hard 20ms timeout budget: if enrichment data is not available within that window, the request proceeds unmodified. The interceptor never makes synchronous calls to external systems and maintains O(1) performance regardless of attribution graph size.'},
      {q:'What happens if the platform goes down?',a:'Nothing changes for your applications. The platform is designed with fail-open safety as a core architectural invariant. If the interceptor, attribution engine, or any platform component fails, all inference requests proceed exactly as they would without the platform installed. There is no request path that depends on platform availability. This is enforced by hardware-level timeout budgets, not application logic.'},
      {q:'How long does initial deployment take?',a:'Passive Observation mode typically deploys in 1-2 days. The platform connects to your cloud billing APIs (read-only), CI/CD systems, source control, and identity providers. No code changes are required. Attribution accuracy improves over the first 2-4 weeks as the Heuristic Reconciliation Engine accumulates correlation data and calibrates confidence scores against ground truth.'},
      {q:'Does the platform require code changes to my applications?',a:'No. In Passive and Advisory modes, the platform operates entirely at the infrastructure layer. In Active Mode (explicit opt-in per workload), model routing changes are transparent to the calling application through the interceptor layer.'},
    ]},
    {cat:'Attribution & Confidence',qs:[
      {q:'How is attribution confidence calculated?',a:'Each layer of the six-layer attribution chain produces an independent confidence score using one or more of six reconciliation methods (R1 through R6). These per-layer scores are combined using Noisy-OR aggregation with a dependency penalty to produce a single request-level confidence. The combined score is calibrated against ground truth (CI/CD provenance, user corrections, FinOps review) using isotonic regression, and capped at 0.95 to account for irreducible enterprise data quality error.'},
      {q:'What should I do about low-confidence attributions?',a:'Low-confidence attributions (below 0.80) are flagged as Provisional and excluded from automated chargebacks. Common causes include shared service accounts, missing CODEOWNERS files, and HR/org-chart lag. The platform surfaces the specific layer and reconciliation method where confidence degrades, so you can address the root cause (e.g., assign CODEOWNERS, eliminate shared service accounts, update org chart sync frequency).'},
      {q:'Can I override or correct an attribution?',a:'Yes. Manual corrections feed back into the calibration loop as ground truth. When you correct a misattribution, the Heuristic Reconciliation Engine updates its priors and confidence calibration curves, improving future accuracy for similar patterns. Corrections are logged immutably for audit purposes.'},
    ]},
    {cat:'Optimization & Governance',qs:[
      {q:'Will the platform block my team\'s requests?',a:'Not unless you explicitly configure it to. The default enforcement posture is soft stops: alerts, Slack notifications, and logging. Requests always proceed. Hard stops (blocking until approval) require explicit opt-in per workload and are intended for specific governance scenarios like production model allowlists or staging cost ceilings. The platform positions itself as an optimizer, not a cost cop.'},
      {q:'How does capability equivalence verification work?',a:'Before the platform ever recommends routing a request to a different model, it verifies that the alternative produces equivalent output quality for that specific use case. Three modes are available: Policy-based (admin-defined model families), Empirical (shadow evaluation on live traffic, minimum 100 requests), and LLM-as-judge (blind evaluation with 200 samples). If no mode confirms equivalence, the request routes to the originally requested model. There is no "just trust us" mode.'},
      {q:'Can I override an intervention recommendation?',a:'Yes. Every recommendation includes a Dismiss option. Dismissals are logged and factor into future recommendation relevance scoring. You can also approve recommendations partially (e.g., apply a model routing change to 50% of traffic for A/B validation before full rollout).'},
      {q:'How do chargebacks work?',a:'The platform attributes costs to teams and cost centers through the six-layer attribution chain. Attributions that meet the chargeback confidence threshold (default ≥ 0.80, configurable) are included in automated chargeback exports. Provisional attributions are excluded and routed to FinOps for manual review. Exports integrate with standard ERP systems via API or CSV.'},
    ]},
    {cat:'Security & Integration',qs:[
      {q:'Where does the platform run?',a:'Inside your infrastructure, within your VPC or cloud account. All telemetry aggregation, attribution logic, and reporting occurs within the customer trust boundary. Raw logs, identifiable data, and inference content never leave your environment. The platform connects to your systems (cloud billing, CI/CD, source control, identity, HR/org) via read-only API integrations.'},
      {q:'What permissions does the platform need?',a:'Read-only access to cloud billing APIs, CI/CD event streams, source control metadata (CODEOWNERS, commit history), identity provider group memberships, and HR/org-chart data. No write permissions to any customer system. No access to inference request content or response payloads in Passive or Advisory modes.'},
      {q:'Does the platform work with our existing observability tools?',a:'Yes. The platform integrates with Datadog, Grafana, Splunk, and other observability platforms for alerting and dashboarding. It also provides native Slack integration for policy violations, budget alerts, and intervention recommendations. CI/CD hooks support GitHub Actions, GitLab CI, Jenkins, and Spinnaker for pre-deploy cost simulation.'},
      {q:'What compliance certifications does the platform hold?',a:'SOC 2 Type 1 certification is in progress. The platform\'s architecture is designed for SOC 2 Type 2, ISO 27001, and GDPR compliance. The carbon ledger produces GHG Protocol-compliant Scope 2 and Scope 3 Category 1 emissions reporting with dual-method (location-based and market-based) accounting.'},
    ]},
    {cat:'Carbon & Sustainability',qs:[
      {q:'How accurate are the carbon figures?',a:'Accuracy depends on the measurement layer. Layer 1 (spend-based): ±50-100% uncertainty. Layer 2 (activity-based, current default): ±15-30% uncertainty, using AI Energy Score benchmarks for energy-per-inference and hourly, region-resolved grid intensity data. Layer 3 (instrumented): ±5-15% uncertainty, requiring host-level measurement probes. Every figure carries an immutable calculation receipt documenting the method, data sources, and uncertainty band.'},
      {q:'How does carbon factor into cost decisions?',a:'Through the TRAC metric. Carbon Liability is a financial line item (emissions × internal carbon price) added to Billed Cost alongside the Confidence Risk Premium. This means carbon impact is visible in the same units (dollars) as direct compute costs, enabling unified decision-making without requiring a separate sustainability workflow. The internal carbon price defaults to $50/tCO₂e and is configurable.'},
    ]},
  ];
  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card"><div style="font-size:12px;color:var(--tx3);line-height:1.6">Common questions about platform operation, integration, security, and methodology. For technical documentation, deployment guides, and API reference, contact your assigned Field Deployment Engineer.</div></div>
    ${cats.map(cat=>`<div class="card"><div class="gl-cat">${cat.cat}</div>${cat.qs.map((q,i)=>`<div class="faq-item" onclick="this.classList.toggle('open')"><div class="faq-q"><span>${q.q}</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div><div class="faq-a">${q.a}</div></div>`).join('')}</div>`).join('')}
    <div class="card" style="border-color:rgba(74,140,247,.15)">
      <div style="display:flex;align-items:center;gap:12px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${I.help}</svg><div><div style="font-size:13px;font-weight:600;color:var(--tx)">Need help with something else?</div><div style="font-size:11px;color:var(--tx3);margin-top:2px">Contact your Field Deployment Engineer or reach us at support@[company].com</div></div></div>
    </div>
  </div>`}
